<!DOCTYPE html>
<html>
<head>
<title>AI Subtitle Generator</title>
<style>
body{
  font-family: Arial;
  background:#f5f7fb;
  text-align:center;
  padding-top:80px;
}
.card{
  background:white;
  width:400px;
  margin:auto;
  padding:30px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}
button{
  background:#4CAF50;
  color:white;
  border:none;
  padding:12px 25px;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}
</style>
</head>

<body>
<div class="card">
<h1>🎬 AI Subtitle Generator</h1>
<p>Upload MP3 or MP4 → Get SRT</p>

<form action="/transcribe" method="post" enctype="multipart/form-data">
<input type="file" name="file" required><br><br>
<button type="submit">Generate Subtitles</button>
</form>

</div>
</body>
</html>
