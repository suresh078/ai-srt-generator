<!DOCTYPE html>
<html>
<head>
<title>AI Subtitle Generator</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-xl">
    <h1 class="text-3xl font-bold text-center mb-6">🎬 AI Subtitle Generator</h1>
    <p class="text-gray-500 text-center mb-8">Upload MP3 or MP4 → Download Accurate SRT</p>

    <form action="/upload" method="post" enctype="multipart/form-data" class="text-center">
        <input type="file" name="file" required
        class="mb-6 w-full border p-3 rounded-lg">

        <button class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg w-full">
            Generate Subtitles
        </button>
    </form>

    <p class="text-xs text-gray-400 mt-6 text-center">
        Powered by Whisper AI • Free Subtitle Tool
    </p>
</div>

</body>
</html>
